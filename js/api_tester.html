const okAPIs = {};

function log(msg, cls='') {
    const d = document.getElementById('log');
    d.innerHTML += `<div class="${cls}">${msg}</div>`;
}

async function testOne(key, info) {
    const rawUrl = info.api.replace(/\/$/, '') + `?ac=videolist&wd=${TEST_QUERY}`;
    const proxyUrl = PROXY_URL + encodeURIComponent(rawUrl);
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    try {
        const r = await fetch(proxyUrl, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!r.ok) return { ok: false, msg: `HTTP ${r.status}` };
        const data = await r.json();
        if (data && Array.isArray(data.list)) {
            return { ok: true, msg: `✅ ${data.list.length}条` };
        }
        return { ok: false, msg: `格式异常` };
    } catch(e) {
        clearTimeout(tid);
        return { ok: false, msg: e.name === 'AbortError' ? '⏰超时' : `❌${e.message.slice(0,30)}` };
    }
}

async function runTest() {
    document.getElementById('startBtn').disabled = true;
    document.getElementById('log').innerHTML = '';
    document.getElementById('summary').innerHTML = '';
    document.getElementById('result-config').textContent = '';
    const keys = Object.keys(APIS);
    let done = 0, okCount = 0;

    // 并发测试，每批10个
    const BATCH = 10;
    for (let i = 0; i < keys.length; i += BATCH) {
        const batch = keys.slice(i, i + BATCH);
        await Promise.all(batch.map(async key => {
            const info = APIS[key];
            const res = await testOne(key, info);
            done++;
            document.getElementById('progress').textContent = `${done}/${keys.length}`;
            if (res.ok) {
                okCount++;
                okAPIs[key] = info;
                log(`${res.msg} [${key}] ${info.name}`, 'ok');
            } else {
                log(`${res.msg} [${key}] ${info.name}`, 'fail');
            }
        }));
    }

    // 生成结果
    document.getElementById('summary').innerHTML = 
        `<h3 class="ok">可用: ${okCount} / 测试: ${done}</h3>`;

    // 生成 customer_site.js 片段
    let jsConfig = `// 可用API列表（测试时间: ${new Date().toLocaleString()}）\n`;
    jsConfig += `const CUSTOMER_SITES = {\n`;
    for (const [key, info] of Object.entries(okAPIs)) {
        const safeKey = key.replace(/[^a-zA-Z0-9_]/g, '_');
        jsConfig += `    ${safeKey}: {\n`;
        jsConfig += `        api: '${info.api}',\n`;
        jsConfig += `        name: '${info.name}',\n`;
        if (info.detail) jsConfig += `        detail: '${info.detail}',\n`;
        jsConfig += `    },\n`;
    }
    jsConfig += `};\n\nif (window.extendAPISites) {\n    window.extendAPISites(CUSTOMER_SITES);\n}`;
    document.getElementById('result-config').textContent = jsConfig;
    document.getElementById('startBtn').disabled = false;
}
