<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="same-origin">
    <title>YiWuTV 播放器</title>
    <link rel="icon" href="image/logo.png">
    <link rel="apple-touch-icon" href="image/logo-black.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="libs/tailwindcss.min.js"></script>
    <script src="js/version-check.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/player.css">
    <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header class="player-header-fixed px-4 flex items-center gap-3">
    <div class="flex items-center min-w-0 flex-shrink-0">
        <button id="homeButton" type="button" class="flex items-center gap-2 min-w-0 cursor-pointer home-button">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0"
                 style="background:linear-gradient(135deg,#e50914,#c8000b)">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
            </div>
            <h1 class="text-base font-bold logo-text hidden sm:block">YiWuTV</h1>
        </button>
    </div>

    <h2 id="videoTitle"
        class="flex-1 text-sm font-medium text-center text-[#c0c0d0] overflow-hidden whitespace-nowrap truncate custom-title-scroll px-2"></h2>

    <a href="#" id="goBack" onclick="goBack(event)"
       class="home-btn flex items-center gap-1.5 px-3 py-1.5 text-sm flex-shrink-0">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="home-btn-text">上一页</span>
    </a>
</header>

<!-- 密码验证弹窗（保留DOM，已禁用） -->
<div id="passwordModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[65]"
     style="backdrop-filter:blur(6px)">
    <div class="bg-[#16161f] p-8 rounded-2xl w-11/12 max-w-md border border-[rgba(255,255,255,0.08)] shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-white">访问验证</h2>
        </div>
        <div class="mb-6">
            <p class="text-[#a0a0b0] mb-4 text-sm">请输入密码继续访问</p>
            <form id="passwordForm" onsubmit="handlePasswordSubmit(); return false;">
                <input type="text" name="username" id="username" autocomplete="username" style="display:none" tabindex="-1" aria-hidden="true">
                <input type="password" id="passwordInput"
                       class="w-full bg-[rgba(255,255,255,0.04)] border border-[rgba(255,255,255,0.09)] text-white px-4 py-3 rounded-xl focus:outline-none text-sm"
                       placeholder="密码..." autocomplete="new-password">
                <button id="passwordSubmitBtn" type="submit"
                        class="mt-4 w-full py-2.5 rounded-xl text-sm font-semibold bg-[#e50914] hover:bg-[#c8000b] text-white transition-all">提交</button>
            </form>
            <p id="passwordError" class="text-[#e50914] mt-3 text-sm hidden">密码错误，请重试</p>
        </div>
    </div>
</div>

<!-- ── Main ──────────────────────────────────────────────────── -->
<main class="px-3 sm:px-4 py-4">
    <div class="flex gap-4 items-start max-w-[1440px] mx-auto">

        <!-- 左栏：播放器主内容 -->
        <div class="flex-1 min-w-0 space-y-3">

            <!-- 视频播放区 -->
            <div id="playerContainer" class="player-container mb-0">
                <div class="relative">
                    <div id="player" class="player-placeholder">
                        <div class="player-loading-overlay">
                            <div class="player-loading-spinner"></div>
                            <div class="player-loading-text" id="loading-title">正在加载视频…</div>
                        </div>
                    </div>
                    <div class="loading-container" id="player-loading" style="display:none">
                        <div class="loading-spinner"></div>
                        <span>正在加载视频…</span>
                    </div>
                    <div class="error-container" id="error">
                        <div class="error-icon">⚠️</div>
                        <div id="error-message">视频加载失败</div>
                        <div class="error-message-sub">请尝试其他视频源或稍后重试</div>
                    </div>
                </div>
            </div>

            <!-- 资源信息栏 -->
            <div class="player-container flex justify-between py-2.5 px-4" id="resourceInfoBarContainer">
                <!-- JS 动态渲染 -->
            </div>

            <!-- 集数导航 -->
            <div class="player-container px-4 py-3">
                <div class="flex justify-between items-center">
                    <button onclick="playPreviousEpisode()" id="prevButton"
                            class="flex items-center gap-1.5 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        上一集
                    </button>
                    <span class="text-sm" id="episodeInfo">加载中…</span>
                    <button onclick="playNextEpisode()" id="nextButton"
                            class="flex items-center gap-1.5 text-sm">
                        下一集
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="player-container px-4 py-2.5">
                <div class="flex flex-wrap justify-end items-center gap-2">
                    <!-- 自动连播 -->
                    <div class="flex items-center gap-2 mr-auto">
                        <span class="text-sm text-[#8a8a9a]">自动连播</span>
                        <label class="switch">
                            <input type="checkbox" id="autoplayToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <!-- 工具按钮组 -->
                    <div class="flex flex-wrap justify-end gap-2">
                        <button onclick="toggleEpisodeOrder()"
                                class="flex items-center gap-1.5 px-3 py-1.5 text-xs rounded-lg">
                            <svg class="w-3.5 h-3.5" id="orderIcon" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v3.586L7.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 10.586V7z" clip-rule="evenodd"/>
                            </svg>
                            <span id="orderText">倒序排列</span>
                        </button>
                        <button title="复制播放链接" onclick="copyLinks()"
                                class="p-1.5 rounded-lg">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 012-2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                            </svg>
                        </button>
                        <button id="lockToggle" onclick="toggleControlsLock()" title="锁定控制"
                                class="p-1.5 rounded-lg">
                            <svg id="lockIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 11V7a3 3 0 00-6 0v4m-3 4h12v6H6v-6z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 集数网格 -->
            <div class="player-container">
                <div class="episode-grid" id="episodesGrid">
                    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2" id="episodesList">
                        <div class="col-span-full text-center text-[#5a5a6e] py-8 text-sm">加载中…</div>
                    </div>
                </div>
            </div>

        </div><!-- end 左栏 -->

        <!-- 右侧推荐栏（桌面端） -->
        <aside id="sideRecommend"
               class="hidden xl:flex flex-col gap-3 flex-shrink-0 sticky top-16 self-start"
               style="width:200px;min-width:200px">
            <div class="flex items-center justify-between mb-1">
                <h3 class="text-xs font-bold text-[#c0c0d0] flex items-center gap-1.5 uppercase tracking-wider">
                    <svg class="w-3.5 h-3.5 text-[#e50914]" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                    </svg>
                    热门推荐
                </h3>
                <span class="text-[10px] text-[#4a4a5a]">TMDB</span>
            </div>
            <div id="sideRecommendList" class="flex flex-col gap-2.5">
                <!-- 骨架屏 -->
                <div class="side-rec-skeleton animate-pulse flex gap-2" style="--i:0">
                    <div class="bg-[rgba(255,255,255,0.05)] rounded-lg flex-shrink-0" style="width:60px;height:84px"></div>
                    <div class="flex-1 space-y-2 pt-1">
                        <div class="h-2.5 bg-[rgba(255,255,255,0.05)] rounded w-full"></div>
                        <div class="h-2.5 bg-[rgba(255,255,255,0.04)] rounded w-2/3"></div>
                    </div>
                </div>
                <div class="side-rec-skeleton animate-pulse flex gap-2" style="--i:1">
                    <div class="bg-[rgba(255,255,255,0.05)] rounded-lg flex-shrink-0" style="width:60px;height:84px"></div>
                    <div class="flex-1 space-y-2 pt-1">
                        <div class="h-2.5 bg-[rgba(255,255,255,0.05)] rounded w-full"></div>
                        <div class="h-2.5 bg-[rgba(255,255,255,0.04)] rounded w-2/3"></div>
                    </div>
                </div>
                <div class="side-rec-skeleton animate-pulse flex gap-2" style="--i:2">
                    <div class="bg-[rgba(255,255,255,0.05)] rounded-lg flex-shrink-0" style="width:60px;height:84px"></div>
                    <div class="flex-1 space-y-2 pt-1">
                        <div class="h-2.5 bg-[rgba(255,255,255,0.05)] rounded w-full"></div>
                        <div class="h-2.5 bg-[rgba(255,255,255,0.04)] rounded w-2/3"></div>
                    </div>
                </div>
                <div class="side-rec-skeleton animate-pulse flex gap-2" style="--i:3">
                    <div class="bg-[rgba(255,255,255,0.05)] rounded-lg flex-shrink-0" style="width:60px;height:84px"></div>
                    <div class="flex-1 space-y-2 pt-1">
                        <div class="h-2.5 bg-[rgba(255,255,255,0.05)] rounded w-full"></div>
                        <div class="h-2.5 bg-[rgba(255,255,255,0.04)] rounded w-2/3"></div>
                    </div>
                </div>
                <div class="side-rec-skeleton animate-pulse flex gap-2" style="--i:4">
                    <div class="bg-[rgba(255,255,255,0.05)] rounded-lg flex-shrink-0" style="width:60px;height:84px"></div>
                    <div class="flex-1 space-y-2 pt-1">
                        <div class="h-2.5 bg-[rgba(255,255,255,0.05)] rounded w-full"></div>
                        <div class="h-2.5 bg-[rgba(255,255,255,0.04)] rounded w-2/3"></div>
                    </div>
                </div>
            </div>
            <button id="sideRecommendRefresh"
                    class="mt-1 w-full text-xs py-1.5 bg-[rgba(255,255,255,0.04)] hover:bg-[rgba(255,255,255,0.07)]
                           border border-[rgba(255,255,255,0.07)] text-[#8a8a9a] hover:text-white
                           rounded-lg transition-all flex items-center justify-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                换一批
            </button>
        </aside>

    </div>
</main>

<!-- 快捷键提示 -->
<div class="shortcut-hint" id="shortcutHint">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="shortcutIcon">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    <span id="shortcutText"></span>
</div>

<!-- 页脚 -->
<footer class="footer mt-4 py-6 border-t border-[rgba(255,255,255,0.06)] bg-[#0a0a0f]">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-3">
            <div>
                <a href="/" class="flex items-center gap-2 mb-1">
                    <div class="w-5 h-5 rounded-md flex items-center justify-center"
                         style="background:linear-gradient(135deg,#e50914,#ff6b35)">
                        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <span class="text-sm font-bold" style="background:linear-gradient(90deg,#f1f1f1,#a0a0b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">YiWuTV</span>
                </a>
                <p class="text-[#3a3a4a] text-xs">© 2025 YiWuTV · 自由观影，畅享精彩</p>
            </div>
            <div class="text-center md:text-right">
                <p class="text-[#3a3a4a] text-xs max-w-md leading-relaxed mb-2">
                    免责声明：本站仅为视频搜索工具，不存储、上传或分发任何视频内容。所有视频均来自第三方API接口。
                </p>
                <div class="flex justify-center md:justify-end gap-4">
                    <a href="about.html" class="text-[#4a4a5a] hover:text-[#a0a0b0] text-xs transition-colors">关于我们</a>
                    <a href="about.html" class="text-[#4a4a5a] hover:text-[#a0a0b0] text-xs transition-colors">隐私政策</a>
                    <a href="https://www.msf.hk/zh-hant/donate/general?type=one-off" target="_blank" rel="noopener"
                       class="text-[#4a4a5a] hover:text-[#e50914] text-xs transition-colors">捐赠</a>
                </div>
            </div>
        </div>
    </div>
</footer>

<!-- 换源模态框 -->
<div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[10000]"
     style="backdrop-filter:blur(6px)">
    <div class="bg-[#16161f] p-8 rounded-2xl w-11/12 max-w-4xl border border-[rgba(255,255,255,0.08)] max-h-[90vh] flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-6 flex-none">
            <h2 id="modalTitle" class="text-xl font-bold text-white break-words pr-4 max-w-[80%]"></h2>
            <button onclick="closeModal()"
                    class="text-[#5a5a6e] hover:text-white text-2xl transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[rgba(255,255,255,0.06)]">
                &times;
            </button>
        </div>
        <div id="modalContent" class="overflow-auto flex-1 min-h-0">
            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2"></div>
        </div>
    </div>
</div>

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-black/75 hidden items-center justify-center z-[10001]"
     style="backdrop-filter:blur(4px)">
    <div class="bg-[#16161f] px-10 py-8 rounded-2xl border border-[rgba(255,255,255,0.08)] flex items-center gap-4 shadow-2xl">
        <div class="w-6 h-6 border-2 border-[rgba(255,255,255,0.1)] border-t-[#e50914] rounded-full animate-spin"></div>
        <p class="text-white text-sm font-medium">加载中…</p>
    </div>
</div>

<!-- ── Scripts ──────────────────────────────────────────────── -->
<script src="libs/sha256.min.js"></script>
<script>window._jsSha256 = window.sha256;</script>
<script src="libs/hls.min.js" crossorigin="anonymous"></script>
<script src="libs/artplayer.min.js" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script src="js/proxy-auth.js"></script>
<script src="js/customer_site.js"></script>
<script src="js/password.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/search.js"></script>
<script src="js/player.js"></script>
<script src="js/player-recommend.js"></script>
<script>
    window.__ENV__ = window.__ENV__ || {};
    window.__ENV__.PASSWORD = "{{PASSWORD}}";

    document.addEventListener('DOMContentLoaded', function() {
        document.body.addEventListener('click', function(event) {
            const homeButton = event.target.closest('#homeButton');
            if (homeButton) {
                event.preventDefault();
                event.stopPropagation();
                if (window.self !== window.top) {
                    try { window.parent.closeVideoPlayer && window.parent.closeVideoPlayer(true); return; }
                    catch (e) {}
                }
                try { window.location.href = '/'; }
                catch (e) { try { window.location.replace('/'); } catch (e2) { window.location.assign('/'); } }
                return false;
            }
        });
    });
</script>
</body>
</html>
